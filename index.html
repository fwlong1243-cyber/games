<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Game Arcade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Pixel Portal</h1>
        <p>A collection of games hosted on GitHub</p>
    </header>

    <main class="game-grid">
        <div class="game-card">
            <h3>Retro Platformer</h3>
            <div class="iframe-container">
                <iframe src="https://your-username.github.io/game-repo-1/" scrolling="no"></iframe>
            </div>
            <a href="https://github.com/your-username/game-repo-1" target="_blank">View Source</a>
        </div>

        <div class="game-card">
            <h3>Space Shooter</h3>
            <div class="iframe-container">
                <iframe src="https://your-username.github.io/game-repo-2/" scrolling="no"></iframe>
            </div>
            <a href="https://github.com/your-username/game-repo-2" target="_blank">View Source</a>
        </div>
    </main>

</body>
</html>
