<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My GitHub Game Hub</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; margin: 0; padding: 20px; text-align: center; }
        header { padding: 40px 0; border-bottom: 1px solid #30363d; margin-bottom: 40px; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 30px; max-width: 1200px; margin: 0 auto; }
        .game-card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; overflow: hidden; transition: transform 0.2s; }
        .game-card:hover { transform: translateY(-5px); border-color: #58a6ff; }
        .embed-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .embed-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .game-info { padding: 15px; text-align: left; }
        .game-info h3 { margin: 0 0 10px; color: #58a6ff; }
    </style>
</head>
<body>
    <header>
        <h1>🎮 My GitHub Arcade</h1>
        <p>A collection of my favorite web games.</p>
    </header>

    <div class="game-grid">
        <!-- Game 1: External Embed (e.g., from Itch.io) -->
        <div class="game-card">
            <div class="embed-wrapper">
                <iframe src="https://playpager.com" allowfullscreen></iframe>
            </div>
            <div class="game-info">
                <h3>Classic Chess</h3>
                <p>Embed games from sites that provide iframe links.</p>
            </div>
        </div>

        <!-- Game 2: Your Own Hosted Game (e.g., a Unity/Godot build in your repo) -->
        <div class="game-card">
            <div class="embed-wrapper">
                <!-- If your game's index.html is in a folder named 'my-game' -->
                <iframe src="./my-game/index.html"></iframe>
            </div>
            <div class="game-info">
                <h3>My Custom Game</h3>
                <p>Host your Unity or Godot WebGL builds directly in this repo.</p>
            </div>
        </div>
    </div>
</body>
</html>
